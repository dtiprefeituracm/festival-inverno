<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival de Inverno — Inscrições</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; }
  .header { background: #1a56a0; color: white; padding: 24px 16px; text-align: center; }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 14px; opacity: 0.85; }
  .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; }
  .container { max-width: 560px; margin: 24px auto; padding: 0 16px 40px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
  .card h2 { font-size: 14px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: #475569; margin-bottom: 4px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; color: #1e293b; outline: none; transition: border 0.2s; }
  input:focus, select:focus { border-color: #1a56a0; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .eventos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .evento-card { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .evento-card:hover { border-color: #1a56a0; background: #f0f6ff; }
  .evento-card.selecionado { border-color: #1a56a0; background: #eff6ff; }
  .evento-card input { display: none; }
  .evento-nome { font-size: 13px; font-weight: 600; color: #1e293b; }
  .evento-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .evento-tipo { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 6px; }
  .tipo-areia { background: #fef3c7; color: #92400e; }
  .tipo-agua { background: #dbeafe; color: #1e40af; }
  .btn { width: 100%; padding: 14px; background: #1a56a0; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
  .btn:hover { background: #1447878; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .msg-erro { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
  .msg-sucesso { display: none; text-align: center; padding: 32px 16px; }
  .msg-sucesso .icone { font-size: 48px; margin-bottom: 12px; }
  .msg-sucesso h2 { font-size: 20px; font-weight: 700; color: #1a56a0; margin-bottom: 6px; }
  .msg-sucesso p { font-size: 14px; color: #475569; margin-bottom: 4px; }
  .numero-ficha { font-size: 28px; font-weight: 700; color: #1a56a0; margin: 12px 0; }
  .share-btn { display: inline-block; margin-top: 14px; padding: 10px 20px; background: #25d366; color: white; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; }
  .obrigatorio { color: #dc2626; }
</style>
</head>
<body>

<div class="header">
  <div class="badge">01 e 02 de Maio</div>
  <h1>Festival de Inverno</h1>
  <p>Inscrições para os eventos esportivos</p>
</div>

<div class="container">

  <div id="formulario">
    <div class="card">
      <h2>Dados pessoais</h2>
      <label>Nome completo <span class="obrigatorio">*</span></label>
      <input type="text" id="nome" placeholder="Seu nome completo">

      <label>CPF <span class="obrigatorio">*</span></label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">

      <div class="row">
        <div>
          <label>Data de nascimento</label>
          <input type="date" id="nascimento">
        </div>
        <div>
          <label>Telefone / WhatsApp <span class="obrigatorio">*</span></label>
          <input type="tel" id="telefone" placeholder="(69) 90000-0000">
        </div>
      </div>

      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">

      <div class="row">
        <div>
          <label>Cidade <span class="obrigatorio">*</span></label>
          <input type="text" id="cidade" placeholder="Sua cidade">
        </div>
        <div>
          <label>UF <span class="obrigatorio">*</span></label>
          <select id="uf">
            <option value="">UF</option>
            <option>AC</option><option>AL</option><option>AM</option><option>AP</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MG</option><option>MS</option>
            <option>MT</option><option>PA</option><option>PB</option><option>PE</option>
            <option>PI</option><option>PR</option><option>RJ</option><option>RN</option>
            <option selected>RO</option><option>RR</option><option>RS</option><option>SC</option>
            <option>SE</option><option>SP</option><option>TO</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Escolha os eventos <span class="obrigatorio">*</span></h2>
      <div class="eventos-grid">
        <label class="evento-card" onclick="toggleEvento(event, this, 1)">
          <input type="checkbox" value="1">
          <div class="evento-nome">Vôlei de Areia</div>
          <div class="evento-sub">Masculino</div>
          <span class="evento-tipo tipo-areia">Esporte de Areia</span>
        </label>
        <label class="evento-card" onclick="toggleEvento(event, this, 2)">
          <input type="checkbox" value="2">
          <div class="evento-nome">Vôlei de Areia</div>
          <div class="evento-sub">Feminino</div>
          <span class="evento-tipo tipo-areia">Esporte de Areia</span>
        </label>
        <label class="evento-card" onclick="toggleEvento(event, this, 3)">
          <input type="checkbox" value="3">
          <div class="evento-nome">Futevôlei</div>
          <div class="evento-sub">Masculino</div>
          <span class="evento-tipo tipo-areia">Esporte de Areia</span>
        </label>
        <label class="evento-card" onclick="toggleEvento(event, this, 4)">
          <input type="checkbox" value="4">
          <div class="evento-nome">Canoagem</div>
          <div class="evento-sub">Aberto</div>
          <span class="evento-tipo tipo-agua">Esporte Aquático</span>
        </label>
        <label class="evento-card" onclick="toggleEvento(event, this, 5)">
          <input type="checkbox" value="5">
          <div class="evento-nome">Caiaque</div>
          <div class="evento-sub">Aberto</div>
          <span class="evento-tipo tipo-agua">Esporte Aquático</span>
        </label>
        <label class="evento-card" onclick="toggleEvento(event, this, 6)">
          <input type="checkbox" value="6">
          <div class="evento-nome">Natação</div>
          <div class="evento-sub">Aberto</div>
          <span class="evento-tipo tipo-agua">Esporte Aquático</span>
        </label>
      </div>
    </div>

    <div class="msg-erro" id="erro"></div>
    <button class="btn" onclick="enviarInscricao()">Enviar inscrição</button>
  </div>

  <div class="msg-sucesso" id="sucesso">
    <div class="icone">🎉</div>
    <h2>Inscrição confirmada!</h2>
    <p>Seu número de ficha é:</p>
    <div class="numero-ficha" id="numero-ficha"></div>
    <p>Guarde esse número. Apresente no dia do evento.</p>
    <a class="share-btn" id="share-link" href="#" target="_blank">Compartilhar no WhatsApp</a>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://pjjqmoxccggsvfjjckhp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NG9lP5x2hkiU_rCIgCTkeA_O29A7aN1';

const eventosSelecionados = new Set();

function toggleEvento(event, el, id) {
  event.preventDefault(); const cb = el.querySelector('input');
  if (eventosSelecionados.has(id)) {
    eventosSelecionados.delete(id);
    el.classList.remove('selecionado');
    cb.checked = false;
  } else {
    eventosSelecionados.add(id);
    el.classList.add('selecionado');
    cb.checked = true;
  }
}

function formatarCPF(v) {
  return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}
document.getElementById('cpf').addEventListener('input', function() {
  this.value = formatarCPF(this.value);
});

function gerarFicha() {
  return 'FI-' + String(Math.floor(Math.random() * 9000) + 1000);
}

async function post(tabela, dados) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(dados)
  });
  return r.json();
}

async function enviarInscricao() {
  const nome = document.getElementById('nome').value.trim();
  const cpf = document.getElementById('cpf').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const cidade = document.getElementById('cidade').value.trim();
  const uf = document.getElementById('uf').value;
  const erro = document.getElementById('erro');

  erro.style.display = 'none';

  if (!nome || !cpf || !telefone || !cidade || !uf) {
    erro.textContent = 'Preencha todos os campos obrigatórios (marcados com *).';
    erro.style.display = 'block';
    return;
  }
  if (eventosSelecionados.size === 0) {
    erro.textContent = 'Selecione pelo menos um evento.';
    erro.style.display = 'block';
    return;
  }

  const btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const ficha = gerarFicha();

  const participante = await post('participantes', {
    nome_completo: nome,
    cpf: cpf,
    email: document.getElementById('email').value.trim() || null,
    telefone: telefone,
    data_nascimento: document.getElementById('nascimento').value || null,
    cidade: cidade,
    uf: uf
  });

  if (!participante || participante.length === 0 || participante.code) {
    erro.textContent = participante?.message?.includes('unique') 
      ? 'Este CPF já está cadastrado.' 
      : 'Erro ao enviar. Tente novamente.';
    erro.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar inscrição';
    return;
  }

  const pid = participante[0].id;

  for (const mid of eventosSelecionados) {
    await post('inscricoes', {
      participante_id: pid,
      modalidade_id: mid,
      numero_ficha: ficha,
      status: 'confirmado'
    });
  }

  document.getElementById('formulario').style.display = 'none';
  document.getElementById('sucesso').style.display = 'block';
  document.getElementById('numero-ficha').textContent = ficha;

  const msg = encodeURIComponent(`Olá! Me inscrevi no Festival de Inverno (01 e 02 de Maio). Meu número de ficha é ${ficha}. Acesse e faça a sua inscrição também!`);
  document.getElementById('share-link').href = `https://wa.me/?text=${msg}`;
}
</script>
</body>
</html>
